<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">

<div class="login-card">
        <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="logo">

        <h1>GitHub Issue Tracker</h1>
        <p>Sign in to manage your issues</p>

        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Enter username">

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter password">

        <div class="remember">
          <input type="checkbox" id="remember">
          <label for="remember">Remember me</label>
        </div>

       <button onclick="login()">Sign In</button>

       <div class="divider">--------------------- <span style="color:black;">OR</span> ---------------------</div>

       <p class="demo">
        Demo Credentials <br> <br>
        Username : <b>admin</b> <br>
        Password : <b>admin123</b>
       </p>

</div>
</div>

</body>
</html>
